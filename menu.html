<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080808">
<meta name="description" content="Infinite Regress — cocktail menu.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Infinite Regress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Syncopate:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --black:     #080808;
    --off-white: #f0ebe0;
    --gold:      #c8a84b;
    --muted:     #f0ebe0;
    --faint:     #d0c5b4;
    --rule:      #2a2520;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    font-size: 16px;
    overflow-x: hidden;
  }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 580px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }

  /* ── Header: tight so drinks land near top of screen ── */
  header {
    text-align: center;
    padding: clamp(1.75rem, 6vw, 3rem) 0 1.75rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
  }

  h1 {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(1.6rem, 7vw, 3rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--off-white);
    line-height: 1.15;
    overflow-wrap: break-word;
  }

  /* ── Cocktail list ── */
  .cocktail-list {
    list-style: none;
  }

  .cocktail {
    padding: clamp(1.1rem, 3.5vw, 1.6rem) 0;
    border-bottom: 1px solid var(--rule);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .cocktail:last-child { border-bottom: none; }

  .cocktail:nth-child(1)  { animation-delay: 0.05s; }
  .cocktail:nth-child(2)  { animation-delay: 0.15s; }
  .cocktail:nth-child(3)  { animation-delay: 0.25s; }
  .cocktail:nth-child(4)  { animation-delay: 0.35s; }
  .cocktail:nth-child(5)  { animation-delay: 0.45s; }
  .cocktail:nth-child(6)  { animation-delay: 0.55s; }
  .cocktail:nth-child(7)  { animation-delay: 0.65s; }
  .cocktail:nth-child(8)  { animation-delay: 0.75s; }
  .cocktail:nth-child(9)  { animation-delay: 0.85s; }
  .cocktail:nth-child(10) { animation-delay: 0.95s; }
  .cocktail:nth-child(11) { animation-delay: 1.05s; }
  .cocktail:nth-child(12) { animation-delay: 1.15s; }

  .cocktail-name {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
    overflow-wrap: break-word;
  }

  .cocktail-desc {
    font-size: clamp(1.15rem, 3.5vw, 1.45rem);
    font-style: italic;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 0.65rem;
    overflow-wrap: break-word;
  }

  .cocktail-spirits {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(0.65rem, 2vw, 0.75rem);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--faint);
    overflow-wrap: break-word;
  }

  /* ── Tagline at bottom ── */
  .tagline {
    margin-top: clamp(2rem, 6vw, 3rem);
    padding-top: 1.5rem;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-style: italic;
    font-size: clamp(0.95rem, 2.8vw, 1.1rem);
    color: var(--rule);
    /* intentionally very dim — a quiet sign-off */
    color: #3a3430;
    line-height: 1.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 400px) {
    .container { padding: 0 1.1rem 3rem; }
    h1 { letter-spacing: 0.04em; }
    .cocktail-name { letter-spacing: 0.05em; }
    .cocktail-spirits { letter-spacing: 0.05em; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>INFINITE REGRESS</h1>
  </header>

  <main>
    <ul class="cocktail-list">

      <li class="cocktail">
        <div class="cocktail-name">Smoke Break</div>
        <p class="cocktail-desc">Peated scotch, coffee, and bitter orange — a dark old-fashioned that lingers.</p>
        <div class="cocktail-spirits">Monkey Shoulder · Laphroaig 10 · State Line</div>
      </li>

      <!-- Add more cocktails here:
      <li class="cocktail">
        <div class="cocktail-name">Name</div>
        <p class="cocktail-desc">Description.</p>
        <div class="cocktail-spirits">Spirit · Spirit · Modifier</div>
      </li>
      -->

    </ul>
  </main>

  <p class="tagline">Every drink a beginning; every sip a long way back.</p>

</div>
</body>
</html>
