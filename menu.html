<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Regress</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --off-white: #f0ebe0;
    --cream: #e8dfc8;
    --gold: #c8a84b;
    --dim: #6a6258;
    --rule: #2a2520;
    --card-bg: #0f0d0a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 4rem 0 3rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 4rem;
  }

  .bar-eyebrow {
    font-family: 'Syncopate', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--off-white);
    margin-bottom: 0.5rem;
  }

  .page-sub {
    font-size: 0.85rem;
    font-style: italic;
    color: var(--dim);
  }

  /* ── Section label ── */
  .section-label {
    font-family: 'Syncopate', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #3a3530;
    margin-bottom: 2rem;
  }

  /* ── Cocktail list ── */
  .cocktail-list {
    list-style: none;
    display: flex;
    flex-direction: column;
  }

  .cocktail {
    padding: 1.6rem 0;
    border-bottom: 1px solid var(--rule);
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
  }

  .cocktail:last-child { border-bottom: none; }

  .cocktail:nth-child(1) { animation-delay: 0.1s; }
  .cocktail:nth-child(2) { animation-delay: 0.2s; }
  .cocktail:nth-child(3) { animation-delay: 0.3s; }
  .cocktail:nth-child(4) { animation-delay: 0.4s; }
  .cocktail:nth-child(5) { animation-delay: 0.5s; }
  .cocktail:nth-child(6) { animation-delay: 0.6s; }
  .cocktail:nth-child(7) { animation-delay: 0.7s; }
  .cocktail:nth-child(8) { animation-delay: 0.8s; }
  .cocktail:nth-child(9) { animation-delay: 0.9s; }
  .cocktail:nth-child(10) { animation-delay: 1.0s; }
  .cocktail:nth-child(11) { animation-delay: 1.1s; }
  .cocktail:nth-child(12) { animation-delay: 1.2s; }

  .cocktail-name {
    font-family: 'Syncopate', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.4rem;
  }

  .cocktail-desc {
    font-size: 1rem;
    font-style: italic;
    color: var(--dim);
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }

  .cocktail-spirits {
    font-family: 'Syncopate', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #3a3530;
  }

  /* ── Footer ── */
  footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
    text-align: center;
  }

  footer p {
    font-family: 'Syncopate', sans-serif;
    font-size: 0.45rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #3a3530;
  }

  footer a {
    color: #3a3530;
    text-decoration: none;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--gold); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="bar-eyebrow">A Home Bar</div>
    <h1>INFINITE REGRESS</h1>
    <div class="page-sub">Every drink a beginning; every sip a long way back.</div>
  </header>

  <main>
    <div class="section-label">— Cocktails —</div>
    <ul class="cocktail-list">

      <li class="cocktail">
        <div class="cocktail-name">Smoke Break</div>
        <p class="cocktail-desc">Peated scotch, coffee, and bitter orange — a dark old-fashioned that lingers.</p>
        <div class="cocktail-spirits">Monkey Shoulder · Laphroaig 10 · Mr. Black</div>
      </li>

      <!-- Add more cocktails here:
      <li class="cocktail">
        <div class="cocktail-name">Name</div>
        <p class="cocktail-desc">Description.</p>
        <div class="cocktail-spirits">Spirit · Spirit · Modifier</div>
      </li>
      -->

    </ul>
  </main>

  <footer>
    <p>Please enjoy responsibly &nbsp;·&nbsp; <a href="recipes.html">Build sheets</a></p>
  </footer>

</div>
</body>
</html>
