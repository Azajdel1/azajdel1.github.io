<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Regress</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #080808;
    --off-white: #f0ebe0;
    --gold:     #c8a84b;
    --muted:    #9a9080;   /* descriptions — readable against black */
    --faint:    #6a6258;   /* spirits / labels — ornamental but visible */
    --rule:     #2a2520;
    --card-bg:  #0f0d0a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 16px; }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 0 1.5rem 5rem;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: clamp(2.5rem, 8vw, 4rem) 0 2.5rem;
    border-bottom: 1px solid var(--rule);
    margin-bottom: clamp(2rem, 6vw, 3.5rem);
  }

  .bar-eyebrow {
    font-family: 'Syncopate', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(1.1rem, 5vw, 1.75rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--off-white);
    margin-bottom: 0.75rem;
    line-height: 1.3;
  }

  .page-sub {
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    font-style: italic;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ── Section label ── */
  .section-label {
    font-family: 'Syncopate', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 0.25rem;
  }

  /* ── Cocktail list ── */
  .cocktail-list {
    list-style: none;
    display: flex;
    flex-direction: column;
  }

  .cocktail {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--rule);
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
  }

  .cocktail:last-child { border-bottom: none; }

  .cocktail:nth-child(1)  { animation-delay: 0.10s; }
  .cocktail:nth-child(2)  { animation-delay: 0.20s; }
  .cocktail:nth-child(3)  { animation-delay: 0.30s; }
  .cocktail:nth-child(4)  { animation-delay: 0.40s; }
  .cocktail:nth-child(5)  { animation-delay: 0.50s; }
  .cocktail:nth-child(6)  { animation-delay: 0.60s; }
  .cocktail:nth-child(7)  { animation-delay: 0.70s; }
  .cocktail:nth-child(8)  { animation-delay: 0.80s; }
  .cocktail:nth-child(9)  { animation-delay: 0.90s; }
  .cocktail:nth-child(10) { animation-delay: 1.00s; }
  .cocktail:nth-child(11) { animation-delay: 1.10s; }
  .cocktail:nth-child(12) { animation-delay: 1.20s; }

  .cocktail-name {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(0.7rem, 2.2vw, 0.85rem);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
  }

  .cocktail-desc {
    font-size: clamp(1.05rem, 2.8vw, 1.2rem);
    font-style: italic;
    font-weight: 400;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 0.65rem;
  }

  .cocktail-spirits {
    font-family: 'Syncopate', sans-serif;
    font-size: clamp(0.5rem, 1.5vw, 0.55rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
  }

  /* ── Footer ── */
  footer {
    margin-top: 2.5rem;
    padding-top: 1.75rem;
    border-top: 1px solid var(--rule);
    text-align: center;
  }

  footer p {
    font-family: 'Syncopate', sans-serif;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--faint);
  }

  footer a {
    color: var(--faint);
    text-decoration: none;
    transition: color 0.2s;
  }

  footer a:hover { color: var(--gold); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .container { padding: 0 1.25rem 4rem; }

    .bar-eyebrow { font-size: 0.5rem; letter-spacing: 0.3em; }

    .cocktail { padding: 1.25rem 0; }

    .cocktail-desc { font-size: 1rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="bar-eyebrow">A Home Bar</div>
    <h1>INFINITE REGRESS</h1>
    <p class="page-sub">Every drink a beginning; every sip a long way back.</p>
  </header>

  <main>
    <div class="section-label">— Cocktails —</div>
    <ul class="cocktail-list">

      <li class="cocktail">
        <div class="cocktail-name">Smoke Break</div>
        <p class="cocktail-desc">Peated scotch, coffee, and bitter orange — a dark old-fashioned that lingers.</p>
        <div class="cocktail-spirits">Monkey Shoulder · Laphroaig 10 · State Line</div>
      </li>

      <!-- Add more cocktails here:
      <li class="cocktail">
        <div class="cocktail-name">Name</div>
        <p class="cocktail-desc">Description.</p>
        <div class="cocktail-spirits">Spirit · Spirit · Modifier</div>
      </li>
      -->

    </ul>
  </main>

  <footer>
    <p>Please enjoy responsibly &nbsp;·&nbsp; <a href="recipes.html">Build sheets</a></p>
  </footer>

</div>
</body>
</html>
